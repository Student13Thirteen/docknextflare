# -----------------------------------------------------------------------------
# NEXTCLOUD + MARIADB + CLOUDFLARE TUNNEL
# Secure private cloud stack — no exposed router ports required.
# -----------------------------------------------------------------------------
# Setup: copy .env.example to .env and fill in your credentials before running.
# -----------------------------------------------------------------------------

services:

  db:
    image: mariadb:10.11
    container_name: nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    restart: always
    volumes:
      - ./database:/var/lib/mysql
    networks:
      - private-net
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: always
    ports:
      - 8080:80
    depends_on:
      - db
    volumes:
      - ./html:/var/www/html
    networks:
      - private-net
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db

  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    depends_on:
      - app
    networks:
      - private-net
    volumes:
      - ./cloudflared:/etc/cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TOKEN}

networks:
  private-net:
    driver: bridge
