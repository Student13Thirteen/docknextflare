# -----------------------------------------------------------------------------
# NEXTCLOUD + MARIADB + CLOUDFLARE TUNNEL
# Secure private cloud stack — production setup with no public host ports.
# -----------------------------------------------------------------------------
# Setup: copy .env.example to .env and fill in your credentials before running.
# -----------------------------------------------------------------------------

services:
  db:
    image: mariadb:10.11
    container_name: nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    restart: unless-stopped
    volumes:
      - ./database:/var/lib/mysql
    networks:
      - private-net
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./html:/var/www/html
    networks:
      - private-net
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
    # Production note:
    # No host port is exposed. Cloudflared reaches http://nextcloud-app:80
    # through the private Docker network. For local-only debug, temporarily use:
    # ports:
    #   - "127.0.0.1:8080:80"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - private-net
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    command: tunnel --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TOKEN}

networks:
  private-net:
    driver: bridge
