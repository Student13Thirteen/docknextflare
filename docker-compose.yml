# -----------------------------------------------------------------------------
# NEXTCLOUD + MARIADB + CLOUDFLARE TUNNEL
# Optimized setup for a secure private cloud without exposing any router ports.
# -----------------------------------------------------------------------------

services:
  db:
    image: mariadb:10.11
    container_name: nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    restart: always
    volumes:
      - ./database:/var/lib/mysql
    networks:
      - private-net
    environment:
      # CHANGE THESE PASSWORDS BEFORE DEPLOYMENT
      - MYSQL_ROOT_PASSWORD=your_secure_root_password_here
      - MYSQL_PASSWORD=your_secure_db_password_here
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: always
    ports:
      - 8080:80
    depends_on:
      - db
    volumes:
      - ./html:/var/www/html
    networks:
      - private-net
    environment:
      # THESE CREDENTIALS MUST MATCH THE DB SETTINGS ABOVE
      - MYSQL_PASSWORD=your_secure_db_password_here
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db

  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    depends_on:
      - app
    networks:
      - private-net
    # REPLACE 'your_cloudflare_token_here' WITH YOUR ACTUAL CLOUDFLARE TOKEN
    command: tunnel --no-autoupdate run --token your_cloudflare_token_here

networks:
  private-net:
    driver: bridge